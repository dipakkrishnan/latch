services:
  latch:
    build: ./py
    volumes:
      - latch-data:/data
    ports:
      - "8100:8100"
      - "8200:8200"
    environment:
      - LATCH_APPROVAL_PORT=8200
      - LATCH_MCP_TRANSPORT=streamable-http
      - LATCH_MCP_HOST=0.0.0.0
      - LATCH_MCP_PORT=8100
      - LATCH_MCP_PATH=/mcp
      # Webhook callback to push approval results into the OpenClaw chat session
      - OPENCLAW_HOOKS_URL=${OPENCLAW_HOOKS_URL:-}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_SESSION_KEY=${OPENCLAW_SESSION_KEY:-}
      - OPENCLAW_CHANNEL=${OPENCLAW_CHANNEL:-}
      - OPENCLAW_CHANNEL_TO=${OPENCLAW_CHANNEL_TO:-}

  # Example: OpenClaw connecting to latch as a sidecar
  # openclaw:
  #   image: openclaw:latest
  #   environment:
  #     - LATCH_URL=http://latch:8100/mcp
  #   depends_on:
  #     - latch

volumes:
  latch-data:
