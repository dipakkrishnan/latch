services:
  latch:
    build: ./py
    volumes:
      - latch-data:/data
    ports:
      - "8100:8100"
      - "8200:8200"
    environment:
      - LATCH_APPROVAL_PORT=8200
      - LATCH_MCP_TRANSPORT=streamable-http
      - LATCH_MCP_HOST=0.0.0.0
      - LATCH_MCP_PORT=8100
      - LATCH_MCP_PATH=/mcp
      # Optional: redirect approval page back to chat/control UI after approve/deny
      - LATCH_APPROVAL_REDIRECT_URL=${LATCH_APPROVAL_REDIRECT_URL:-}
      # Webhook callback to push approval results into the OpenClaw chat session
      - OPENCLAW_HOOKS_URL=${OPENCLAW_HOOKS_URL:-http://host.docker.internal:18789/hooks/agent}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-latch-webhook-token-2026}
      - OPENCLAW_SESSION_KEY=${OPENCLAW_SESSION_KEY:-agent:main:whatsapp:direct:+14124679849}
      - OPENCLAW_CHANNEL=${OPENCLAW_CHANNEL:-whatsapp}
      - OPENCLAW_CHANNEL_TO=${OPENCLAW_CHANNEL_TO:-+14124679849}

  # Example: OpenClaw connecting to latch as a sidecar
  # openclaw:
  #   image: openclaw:latest
  #   environment:
  #     - LATCH_URL=http://latch:8100/mcp
  #   depends_on:
  #     - latch

volumes:
  latch-data:
