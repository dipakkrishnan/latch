name: Publish OpenClaw Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "openclaw-plugin-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-openclaw-plugin
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package metadata
        run: |
          test "$(npm pkg get name | tr -d '"')" = "openclaw-latch"
          npm pkg get version
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
