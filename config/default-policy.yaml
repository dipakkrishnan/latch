# Latch policy configuration
# Copy to ~/.latch/policy.yaml and customize.
#
# Actions:
#   allow   — auto-approve (no prompt)
#   deny    — block the command
#   approve — send TOTP approval request to user
#
# Patterns are matched against exec commands using regex.
# Rules are evaluated top-to-bottom; first match wins.
# If no rule matches, defaultAction is used.

defaultAction: approve

rules:
  - match: {tool: '(ls|pwd|whoami|cat|head|tail|echo|date|env)'}
    action: allow
  - match: {tool: '(rm|chmod|chown|kill|shutdown|reboot)'}
    action: deny
